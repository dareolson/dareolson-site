<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dare Olson — Filmmaker / Cinematographer / Creative Director</title>
  <meta name="description" content="Derek Olson is a filmmaker, cinematographer, and creative director. Commercial work for Pepsi, Disney, Beyond Meat, DC Shoes, and more. Founder of Grain and Thunder.">
  <meta name="author" content="Derek Olson">
  <link rel="canonical" href="https://www.dareolson.com/">

  <!-- Open Graph -->
  <meta property="og:title" content="Dare Olson — Filmmaker / Cinematographer / Creative Director">
  <meta property="og:description" content="Derek Olson is a filmmaker, cinematographer, and creative director. Commercial work for Pepsi, Disney, Beyond Meat, and more.">
  <meta property="og:url" content="https://www.dareolson.com/">
  <meta property="og:type" content="website">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Derek Olson",
    "alternateName": "Dare Olson",
    "url": "https://www.dareolson.com",
    "email": "derek@grainandthunder.com",
    "jobTitle": ["Filmmaker", "Cinematographer", "Creative Director"],
    "worksFor": {
      "@type": "Organization",
      "name": "Grain and Thunder"
    },
    "sameAs": [
      "https://www.linkedin.com/in/dareolson",
      "https://www.youtube.com/@dareolson",
      "https://github.com/dareolson"
    ]
  }
  </script>

  <!-- Global styles: layout, typography, colors, nav -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Frog-specific styles: layer stacking, eye animation, fly cursor -->
  <link rel="stylesheet" href="css/frog.css">
</head>
<body>

  <!-- =============================================
       FLY CURSOR
       Replaces the default mouse pointer.
       Split into two halves so the wings (bottom)
       can flap independently of the body (top).
  ============================================= -->
  <div id="fly-cursor">
    <!-- Top half: head/body — clipped, no animation -->
    <span id="fly-top">🪰</span>
    <!-- Bottom half: wings — clipped, flaps via CSS animation -->
    <span id="fly-bottom">🪰</span>
  </div>

  <!-- =============================================
       NAVIGATION
       Fixed top-right. Links to main sections.
  ============================================= -->
  <nav id="main-nav">
    <a href="pages/work/index.html">WORK</a>
    <a href="pages/about.html">ABOUT</a>
    <a href="pages/contact.html">CONTACT</a>
  </nav>

  <!-- =============================================
       HOMEPAGE HERO
       Full-viewport area that holds the frog and
       the site identity text.
  ============================================= -->
  <main id="hero">

    <!-- =============================================
         FROG CHARACTER
         10 SVG layers stacked in the same position.
         Each SVG covers the full viewport but only
         its relevant body part is visible inside it.
         Order matters — layers lower in the list
         appear on top.
    ============================================= -->
    <div id="frog">
      <!-- Back legs — behind body -->
      <img class="frog-layer" id="layer-r-leg-back" src="FrogFix/Frogredo_0010s_0000_R-Leg.png" alt="">
      <img class="frog-layer" id="layer-l-leg-back" src="FrogFix/Frogredo_0011s_0000_L-Leg.png" alt="">

      <!-- Body -->
      <img class="frog-layer" id="layer-body"       src="FrogFix/Frogredo_0009s_0000_Body.png"  alt="">

      <!-- Front legs — in front of body -->
      <img class="frog-layer" id="layer-r-leg"      src="FrogFix/Frogredo_0000s_0000_R-Leg.png" alt="">
      <img class="frog-layer" id="layer-l-leg"      src="FrogFix/Frogredo_0006s_0000_L-Leg.png" alt="">

      <!-- Mouth — swapped during eat animation -->
      <img class="frog-layer" id="layer-mouth"      src="FrogFix/Frogredo_0005s_0000_Mouth-1.png" alt="">

      <!-- Nose -->
      <img class="frog-layer" id="layer-nose"       src="FrogFix/Frogredo_0003s_0000_Nose.png"  alt="">

      <!-- Eyeballs — moved by JS to track fly cursor -->
      <img class="frog-layer" id="layer-r-eyeball"  src="FrogFix/Frogredo_0002s_0000_R-eyeball.png" alt="">
      <img class="frog-layer" id="layer-l-eyeball"  src="FrogFix/Frogredo_0008s_0000_L-eyeball.png" alt="">

      <!-- Eyelids — on top of eyeballs, swapped during blink -->
      <img class="frog-layer" id="layer-r-eyelid"   src="FrogFix/Frogredo_0001s_0000_R-eyelid-1.png" alt="">
      <img class="frog-layer" id="layer-l-eyelid"   src="FrogFix/Frogredo_0007s_0000_L-eyelid-1.png" alt="">

      <!-- Tongue — inside #frog so it shares the same scale(0.8) coordinate space.
           Must be last so it renders on top of all other layers. -->
      <img class="frog-layer" id="layer-tongue" src="FrogFix/Frogredo_0004s_0000_Tongue-1.png" alt="" style="opacity:0">

    </div>


    <!-- =============================================
         SITE IDENTITY
         Name and title, pinned bottom-left.
    ============================================= -->
    <div id="identity">
      <h1>Dare Olson</h1>
      <p>Filmmaker &nbsp;/&nbsp; Cinematographer &nbsp;/&nbsp; Creative Director</p>
      <a id="cta" href="pages/work/index.html">View Work &#8599;</a>
    </div>

  </main>

  <!-- Frog eye tracking + fly cursor movement -->
  <script src="js/frog.js?v=38"></script>

  <!-- General page behaviour (empty for now) -->
  <script src="js/main.js"></script>
</body>
</html>
